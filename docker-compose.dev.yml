services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: s4p-frontend:dev
    command: npm run dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports: !override
      - "${FRONTEND_PORT}:4173"

  backend:
    command: ["node", "--inspect=0.0.0.0:9229", "dist/index.js"]
    ports:
      - "${BACKEND_PORT}:3001"
      - "9229:9229"

  nginx:
    profiles:
      - prod

volumes:
  frontend_node_modules: